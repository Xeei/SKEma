events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;

    # SKE-Schema — listens on port 80
    server {
        listen 80;

        location / {
            set $ske_frontend http://skeschema-frontend:3000;
            proxy_pass $ske_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HouseTutor — listens on port 81
    server {
        listen 81;

        location / {
            set $ht_frontend http://housetutor-frontend:3001;
            proxy_pass $ht_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
